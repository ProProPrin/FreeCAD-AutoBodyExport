[tool.ruff]
target-version = "py311"
line-length = 100
extend-exclude = ["tests/tmp*", ".test-tmp-*", ".uv-cache", ".uv-tools"]

[tool.ruff.lint]
select = ["E", "F", "I", "W"]

[tool.ruff.lint.isort]
known-first-party = ["freecad"]
known-third-party = ["FreeCAD", "FreeCADGui", "Mesh", "MeshPart", "Part", "PySide"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
